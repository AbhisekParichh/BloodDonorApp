spring.jpa.show-sql=true
spring.thymeleaf.cache=false


spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/BloodDonor}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:YOUR_GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET:YOUR_GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.scope=profile,email

# Google Gemini API
gemini.api.key=${GEMINI_API_KEY:YOUR_GEMINI_API_KEY}

# Twilio SMS API 
twilio.account.sid=${TWILIO_ACCOUNT_SID:YOUR_TWILIO_SID}
twilio.auth.token=${TWILIO_AUTH_TOKEN:YOUR_TWILIO_AUTH_TOKEN}
twilio.phone.number=${TWILIO_PHONE_NUMBER:whatsapp:+14155238886}