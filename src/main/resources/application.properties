spring.jpa.show-sql=true
spring.thymeleaf.cache=false


spring.datasource.url=jdbc:mysql://localhost:3306/BloodDonor
spring.datasource.username=root
spring.datasource.password=root
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:YOUR_CLIENT_ID_HERE}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET:YOUR_CLIENT_SECRET_HERE}
spring.security.oauth2.client.registration.google.scope=profile,email

# Google Gemini API
gemini.api.key=${GEMINI_API_KEY:YOUR_GEMINI_KEY_HERE}

# Twilio SMS API (Leave as YOUR_TWILIO_SID to run in Mock Mode for demonstrations)
twilio.account.sid=${TWILIO_ACCOUNT_SID:YOUR_TWILIO_SID_HERE}
twilio.auth.token=${TWILIO_AUTH_TOKEN:YOUR_TWILIO_TOKEN_HERE}
twilio.phone.number=whatsapp:+14155238886